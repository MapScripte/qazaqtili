<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аспан Әлемі - Видео</title>
    <style>
        /* Негізгі стильдер */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Артық айналдыруды болдырмау */
        }

        /* Артқы фон (Аспан әлемі) */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Ғарыш бейнесін Unsplash-тен аламыз, немесе өз суретіңізді қойсаңыз болады */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), 
                        url('https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* Контейнер */
        .video-container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6); /* Видео айналасындағы күңгірт фон */
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: white;
            font-family: 'Arial', sans-serif;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d4ff;
        }
        h4 {
            color: rgb(214, 236, 16);
            font-family: 'Arial', sans-serif;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #00d4ff;
            
        }
        /* Видео стилі */
        video {
            width: 100%; /* Видеоның ені (экранның 80%-ы) */
            max-width: 900px;
            border-radius: 10px;
            outline: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #6014ec; color: rgb(240, 239, 239);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

    <div class="background"></div>

    <div class="video-container">
        <h1>ЖАҢА ТАҚЫРЫП</h1>
        <h4><i>Аспандағы жұлдызға қол созбас бұрын, жердегі еңбектің дәмін тат. 
            <p>Жұлдыздар тек биіктіктің белгісі емес, ол – тынымсыз ізденіс пен маңдай тердің жемісі</p></i></h4>
        
        <video controls autoplay muted loop title="1.mp4">
            <source src="тақырып ашылуы.mp4" type="video/mp4">
            Сіздің браузеріңіз видеоны қолдамайды.
        </video>
    </div>

</body>
</html>
