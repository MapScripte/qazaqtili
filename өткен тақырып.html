<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивті шолу тақтасы</title>
    <style>
        /* Мультимедиялық тақта стилі: толық экран */
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Скроллды алып тастау */
            font-family: 'Arial Rounded MT Bold', sans-serif;
        }

        /* Жұлдызды аспан анимациясымен */
        body {
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Жұлдыздар эффектісі */
        .stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            animation: moveStars 100s linear infinite;
            z-index: 0;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: 10000px 5000px; }
        }

        /* Негізгі панель */
        .board {
            position: relative;
            z-index: 1;
            width: 95vw;
            height: 90vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: grid;
            grid-template-rows: auto 1fr auto;
            padding: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Жарқыраған тақырып */
        h1 {
            color: #00f2ff;
            font-size: 3.5vw;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
        }

        /* Орталық бөлім: Сурет пен Дәйексөз */
        .content-grid {
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 20px;
            overflow: hidden;
        }

        .main-img {
            height: 55vh; /* Экранның жартысынан көбін алады */
            border-radius: 20px;
            border: 5px solid #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
            object-fit: contain;
        }

        /* Дәйексөз стилі */
        .quote-box {
            flex: 1;
            max-width: 40%;
            background: rgba(255, 204, 0, 0.1);
            border-left: 8px solid #ffcc00;
            padding: 30px;
            border-radius: 15px;
            text-align: left;
        }

        .quote-text {
            color: #fff;
            font-size: 2.2vw;
            line-height: 1.3;
            margin: 0;
            font-style: italic;
        }

        .quote-text span {
            color: #ffcc00;
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        /* Төменгі нұсқаулық панелі */
        .footer-instruction {
            background: #ffcc00;
            color: #000;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.8vw;
            font-weight: bold;
            margin-top: 20px;
            display: inline-block;
            align-self: center;
            box-shadow: 0 5px 15px rgba(255, 204, 0, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background-color: #6014ec; color: rgb(240, 239, 239);
            border: none; padding: 10px 18px;
            font-size: 14px; border-radius: 10px;
            cursor: pointer; z-index: 150;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

    <div class="stars-container"></div>

    <div class="board">
        <h1>Өткен тақырыпқа шолу</h1>

        <div class="content-grid">
            <img src="қазақ тілі.png" alt="Ойын суреті" class="main-img">
            
            <div class="quote-box">
                <p class="quote-text">
                    "Қайталау – <span>білімді бекітеді,</span> 
                    еңбек – <span>оны шыңдайды"</span>
                </p>
            </div>
        </div>

        <div>
            <div class="footer-instruction">
                📢 Презентациядағы сұрақтарға жауап береміз!
            </div>
        </div>
    </div>

</body>
</html>
