<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ғарыш Әлемі: Топқа бөлу</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: #020205;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
        }
        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a192f 0%, #020205 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.5; animation: blink var(--d) infinite ease-in-out;
        }
        @keyframes blink {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .main-card {
            margin-top: 50px;
            width: 90%; max-width: 850px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative; z-index: 10;
        }
        h1 {
            font-size: 2.5rem; font-weight: 700;
            background: linear-gradient(to right, #fff, #f1c40f, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px; letter-spacing: 5px;
            text-transform: uppercase;
        }
        textarea {
            width: 100%; height: 200px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px; color: #fff;
            padding: 20px; font-size: 1.1rem;
            outline: none; transition: 0.4s;
            margin-bottom: 20px; font-family: inherit;
        }
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-glow {
            padding: 15px 40px; font-size: 1.1rem; font-weight: bold;
            color: #000; background: #f1c40f;
            border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.4);
            text-transform: uppercase;
        }
        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(241, 196, 15, 0.7); }
        
        .btn-clear {
            padding: 15px 30px; font-size: 1rem; font-weight: bold;
            color: #fff; background: rgba(231, 76, 60, 0.2);
            border: 1px solid #e74c3c; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-clear:hover { background: #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }

        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; margin-top: 40px; width: 90%; max-width: 1200px;
            position: relative; z-index: 10;
        }
        .card {
            background: rgba(255, 255, 255, 0.05); border-radius: 25px;
            padding: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; align-items: center;
        }
        .text{
            color: #9ab088;
            background: linear-gradient(to right, #fff, var(--star-gold), var(--danger-red)) ;
            
            margin-top: 20px;
            margin-bottom: 20px;

        }
        .student-ul { list-style: none; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .student-ul li { padding: 8px 0; font-size: 1.1rem; display: flex; align-items: center; }
        .temir-style { border-top: 5px solid #f1c40f; }
        .aikun-style { border-top: 5px solid #ecf0f1; }
        .sholpan-style { border-top: 5px solid #3498db; }
        .back-btn { position: fixed; top: 20px; left: 20px; background-color: #ece914; color: rgb(8, 8, 8); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; z-index: 100; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>
    <div class="background-container" id="stars-box"></div>
    
    <div class="main-card">
        <h1>ЖҰЛДЫЗДАР МЕН АҢЫЗДАР</h1>
        <p class="text">Бірлескен еңбек – берекелі іс. Жұлдыздар шоғырланып жарық берсе, біз топтасып биікке жетеміз!</p>
        <p style="color: #8892b0; margin-bottom: 20px;">Оқушылар тізімі автоматты түрде сақталады</p>
        
        <textarea id="namesList" placeholder="Есімдерді енгізіңіз..."></textarea>
        
        <div class="button-group">
            <button class="btn-glow" onclick="splitToGroups()">ТОПҚА БӨЛУ</button>
            <button class="btn-clear" onclick="clearList()">ТІЗІМДІ ТАЗАЛАУ</button>
        </div>
    </div>

    <div id="resultsArea" class="results-grid"></div>

    <script>
        const textArea = document.getElementById('namesList');

        // 1. Бет жүктелгенде сақталған тізімді шығару
        window.onload = () => {
            const savedData = localStorage.getItem('space_game_students');
            if (savedData) {
                textArea.value = savedData;
            } else {
                // Егер жады бос болса, үлгі ретінде 23 оқушыны жазу (Тек бірінші рет)
                const sample = Array.from({length: 23}, (_, i) => `Оқушы ${i+1}`).join('\n');
                textArea.value = sample;
                localStorage.setItem('space_game_students', sample);
            }
            createStars();
        };

        // 2. Жазу барысында әр өзгерісті сақтау
        textArea.addEventListener('input', () => {
            localStorage.setItem('space_game_students', textArea.value);
        });

        // 3. Тек осы батырманы басқанда ғана өшіру
        function clearList() {
            if(confirm("Тізімді толық өшіргіңіз келе ме?")) {
                textArea.value = "";
                localStorage.removeItem('space_game_students');
                document.getElementById('resultsArea').innerHTML = "";
            }
        }

        function createStars() {
            const box = document.getElementById('stars-box');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = star.style.height = Math.random() * 3 + 'px';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
                box.appendChild(star);
            }
        }

        function splitToGroups() {
            const students = textArea.value.split('\n').map(s => s.trim()).filter(s => s !== "");
            if (students.length < 3) return alert("Кемінде 3 есім қажет!");

            students.sort(() => Math.random() - 0.5);
            const groups = [[], [], []];
            students.forEach((name, i) => groups[i % 3].push(name));

            const config = [
                { name: "ТЕМІРҚАЗЫҚ", icon: "⭐", class: "temir-style" },
                { name: "АЙ МЕН КҮН", icon: "🌗", class: "aikun-style" },
                { name: "ШОЛПАН ЖҰЛДЫЗЫ", icon: "💫", class: "sholpan-style" }
            ];

            const container = document.getElementById('resultsArea');
            container.innerHTML = "";

            groups.forEach((group, i) => {
                const card = document.createElement('div');
                card.className = `card ${config[i].class}`;
                card.innerHTML = `
                    <div style="font-size:2rem; margin-bottom:10px">${config[i].icon}</div>
                    <h2 style="color:#f1c40f; margin-bottom:15px">${config[i].name}</h2>
                    <ul class="student-ul">${group.map(s => `<li>${s}</li>`).join('')}</ul>
                `;
                container.appendChild(card);
            });
            window.scrollTo({ top: container.offsetTop - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>
